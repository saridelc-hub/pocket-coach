<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pocket Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <span class="header-icon">&#9918;</span>
    <h1>Pocket Coach</h1>
    <button class="btn-icon" id="settings-btn" style="background:none;border:none;color:white;font-size:1.3rem;cursor:pointer;" title="Ajustes">&#9881;</button>
  </header>

  <!-- Settings Modal (export/import) -->
  <div class="modal-overlay hidden" id="settings-overlay">
    <div class="modal">
      <h2 class="modal-title">Ajustes</h2>

      <div class="section-title">Respaldo de Datos</div>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">Exporta tus datos para no perderlos, o impórtalos en otro dispositivo.</p>

      <button class="btn btn-primary btn-block mb-1" id="export-btn">Exportar datos (JSON)</button>

      <label class="btn btn-outline btn-block" style="cursor:pointer;">
        Importar datos
        <input type="file" id="import-file" accept=".json" style="display:none;">
      </label>

      <div class="section-title mt-2">Información</div>
      <p style="font-size:0.8rem;color:var(--text-secondary);">Pocket Coach v1.0 &mdash; Herramienta de softbol</p>
      <p style="font-size:0.8rem;color:var(--text-secondary);">Los datos se guardan localmente en este dispositivo.</p>

      <div class="modal-actions">
        <button class="btn btn-outline btn-block" id="settings-close">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main id="app"></main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="plantel">
      <span class="nav-icon">&#128101;</span>
      Plantel
    </button>
    <button class="nav-btn" data-page="alineacion">
      <span class="nav-icon">&#9830;</span>
      Alineación
    </button>
    <button class="nav-btn" data-page="practica">
      <span class="nav-icon">&#128203;</span>
      Práctica
    </button>
    <button class="nav-btn" data-page="juego">
      <span class="nav-icon">&#9917;</span>
      Juego
    </button>
    <button class="nav-btn" data-page="estadisticas">
      <span class="nav-icon">&#128202;</span>
      Stats
    </button>
  </nav>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

  <!-- App Entry -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
